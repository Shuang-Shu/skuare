version: 2

project_name: skuare-svc

before:
  hooks:
    - cd skuare-svc && go mod download

builds:
  - id: skuare-svc
    dir: skuare-svc
    main: ./cmd/skuare-svc
    binary: skuare-svc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: raw-binaries
    builds:
      - skuare-svc
    formats:
      - binary
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

changelog:
  use: git
  sort: asc
